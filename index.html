<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reyna & Aaron 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #ffe4f0 0%, #f3e7ff 50%, #e8f4ff 100%);
        }

        /* ── PIN GATE ── */
        #gate { width: 100%; max-width: 420px; padding: 1.5rem; display: none; }
        .gate-card {
            background: white; border-radius: 28px; padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 12px 60px rgba(220,80,120,0.12);
            border: 1.5px solid rgba(220,80,120,0.1);
        }
        .heart-anim { font-size: 56px; display: block; animation: pulse 1.4s infinite; margin-bottom: .5rem; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
        .gate-title { font-family:'Dancing Script',cursive; font-size:36px; color:#c0396a; margin-bottom:.2rem; }
        .gate-sub { font-size:13px; color:#a06080; margin-bottom:1.8rem; }
        .name-btns { display:flex; gap:12px; justify-content:center; margin-bottom:1.4rem; }
        .name-btn {
            flex:1; padding:11px 0; border-radius:50px; border:2px solid #e8a0c0;
            background:white; color:#c0396a; font-size:15px; font-weight:500;
            cursor:pointer; transition:all .2s; font-family:'Poppins',sans-serif;
        }
        .name-btn.selected,.name-btn:hover { background:linear-gradient(90deg,#e8609a,#a855f7); color:white; border-color:transparent; }
        .pin-label { font-size:13px; color:#a06080; margin-bottom:8px; display:block; }
        .pin-input {
            width:100%; padding:12px 16px; border-radius:50px; border:1.5px solid #e8a0c0;
            font-size:22px; text-align:center; letter-spacing:10px; color:#c0396a;
            outline:none; font-family:'Poppins',sans-serif; margin-bottom:.5rem; transition:border-color .2s;
        }
        .pin-input:focus { border-color:#c0396a; }
        .pin-input.error { border-color:#e24b4a; animation:shake .3s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
        .error-msg { color:#e24b4a; font-size:12px; min-height:18px; margin-bottom:.5rem; }
        .enter-btn {
            width:100%; padding:13px; border-radius:50px; border:none;
            background:linear-gradient(90deg,#e8609a,#a855f7); color:white;
            font-size:16px; font-weight:500; cursor:pointer; font-family:'Poppins',sans-serif;
            transition:opacity .2s,transform .1s; margin-top:8px;
        }
        .enter-btn:hover { opacity:.9; transform:scale(1.02); }

        /* ── CHATROOM ── */
        #chatroom {
            display:none; width:100%; max-width:680px; height:90vh; max-height:780px;
            flex-direction:column; border-radius:28px; overflow:hidden;
            box-shadow:0 16px 60px rgba(160,60,120,0.18);
            border:1.5px solid rgba(200,80,140,0.12);
            background:linear-gradient(135deg,#fff0f7 0%,#f8f0ff 50%,#f0f7ff 100%);
        }
        .chat-header {
            background:linear-gradient(90deg,#e8609a 0%,#a855f7 100%);
            padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
        }
        .chat-header-left { display:flex; align-items:center; gap:12px; }
        .avatar-circle {
            width:44px; height:44px; border-radius:50%;
            background:rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center;
            font-size:22px; border:2px solid rgba(255,255,255,0.4);
        }
        .chat-title { font-family:'Dancing Script',cursive; font-size:26px; color:white; line-height:1; }
        .chat-user-tag { font-size:11px; color:rgba(255,255,255,0.8); margin-top:2px; }
        .header-btns { display:flex; gap:8px; align-items:center; }
        .hdr-btn {
            background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);
            border-radius:50px; padding:6px 12px; color:white; font-size:12px;
            cursor:pointer; font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:5px; transition:background .2s;
        }
        .hdr-btn:hover { background:rgba(255,255,255,0.3); }

        /* Messages */
        .messages-area {
            flex:1; padding:16px; overflow-y:auto;
            display:flex; flex-direction:column; gap:10px;
        }
        .messages-area::-webkit-scrollbar { width:6px; }
        .messages-area::-webkit-scrollbar-track { background:transparent; }
        .messages-area::-webkit-scrollbar-thumb { background:#f0b0d0; border-radius:10px; }
        .system-msg {
            text-align:center; font-size:11px; color:#b080a0;
            padding:5px 14px; background:rgba(255,255,255,0.6);
            border-radius:20px; align-self:center;
        }
        .msg-row { display:flex; align-items:flex-end; gap:8px; position:relative; }
        .msg-row.mine { flex-direction:row-reverse; }
        .msg-avatar {
            width:30px; height:30px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:600; flex-shrink:0;
        }
        .msg-avatar.reyna { background:#ffd0e8; color:#c0396a; }
        .msg-avatar.aaron { background:#d8c0ff; color:#7c3aed; }
        .bubble {
            max-width:65%; padding:10px 14px; border-radius:20px;
            font-size:14px; line-height:1.5; position:relative; cursor:pointer;
        }
        .bubble.theirs {
            background:white; color:#5a2060; border-bottom-left-radius:4px;
            box-shadow:0 2px 10px rgba(180,60,120,0.08);
        }
        .bubble.mine {
            background:linear-gradient(135deg,#e8609a,#a855f7);
            color:white; border-bottom-right-radius:4px;
        }
        .bubble-name { font-size:10px; opacity:.6; margin-bottom:3px; font-weight:500; }
        .bubble-img { max-width:100%; border-radius:12px; margin-top:6px; margin-bottom:4px; }
        .bubble-time { font-size:10px; opacity:.6; text-align:right; margin-top:4px; }
        .full-timestamp {
            display:none; font-size:10px; color:#b080a0;
            text-align:center; margin-top:3px; align-self:center;
        }
        .msg-row:hover .full-timestamp { display:block; }

        /* Reply quote inside bubble */
        .reply-quote {
            border-left:3px solid rgba(255,255,255,0.5);
            padding:4px 8px; margin-bottom:6px;
            border-radius:4px; font-size:11px; opacity:.8;
            background:rgba(255,255,255,0.15);
        }
        .bubble.theirs .reply-quote {
            border-left-color:#e8a0c0;
            background:rgba(232,96,154,0.08);
        }

        /* Reply action button — appears on hover */
        .reply-btn {
            display:none; position:absolute;
            background:white; border:none; border-radius:50%;
            width:28px; height:28px; font-size:14px; cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,0.12); align-items:center; justify-content:center;
            top:50%; transform:translateY(-50%);
        }
        .msg-row:hover .reply-btn { display:flex; }
        .msg-row.mine .reply-btn { left:-36px; }
        .msg-row:not(.mine) .reply-btn { right:-36px; }

        /* Reply preview bar (above input) */
        #reply-bar {
            display:none; padding:8px 16px; background:#fff8fc;
            border-top:1px solid rgba(200,80,140,0.1);
            align-items:center; gap:10px; flex-shrink:0;
        }
        .reply-bar-line {
            border-left:3px solid #e8609a; padding:4px 10px;
            border-radius:4px; background:rgba(232,96,154,0.06); flex:1;
        }
        .reply-bar-name { font-size:11px; color:#e8609a; font-weight:600; }
        .reply-bar-text { font-size:12px; color:#a06080; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; }
        .reply-cancel { background:none; border:none; font-size:18px; color:#c0396a; cursor:pointer; padding:0 4px; }

        /* Image preview bar */
        #img-preview-bar {
            display:none; padding:8px 16px 0; background:white;
            align-items:center; gap:10px; border-top:1px solid rgba(200,80,140,0.1);
        }

        /* Input */
        .chat-input-area {
            padding:12px 16px; background:white;
            border-top:1px solid rgba(200,80,140,0.1);
            display:flex; gap:10px; align-items:center; flex-shrink:0;
        }
        .img-upload-label {
            cursor:pointer; width:40px; height:40px; border-radius:50%;
            background:#fce7f3; display:flex; align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0; transition:background .2s;
        }
        .img-upload-label:hover { background:#f9d0e8; }
        .chat-input {
            flex:1; padding:10px 16px; border-radius:50px; border:1.5px solid #e8a0c0;
            font-size:14px; color:#5a2060; outline:none; font-family:'Poppins',sans-serif;
            transition:border-color .2s; background:#fff8fc;
        }
        .chat-input:focus { border-color:#c0396a; }
        .chat-input::placeholder { color:#d0a0c0; }
        .send-btn {
            width:42px; height:42px; border-radius:50%; border:none;
            background:linear-gradient(135deg,#e8609a,#a855f7); color:white;
            font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:transform .1s,opacity .2s; flex-shrink:0;
        }
        .send-btn:hover { transform:scale(1.08); }
        .send-btn:active { transform:scale(0.95); }

        /* Date divider */
        .date-divider { display:flex; align-items:center; gap:10px; margin:10px 0 4px; align-self:stretch; }
        .date-divider::before,.date-divider::after { content:''; flex:1; height:1px; background:rgba(200,80,140,0.15); }
        .date-divider span {
            font-size:11px; color:#b080a0; white-space:nowrap;
            background:rgba(255,255,255,0.6); padding:3px 10px; border-radius:20px;
        }

        /* No messages */
        #no-messages-placeholder { text-align:center; color:#c090b0; font-size:14px; margin-top:40px; }

        /* Particles */
        .particle { position:fixed; pointer-events:none; font-size:16px; animation:floatUp 2.2s ease-out forwards; z-index:9999; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.4)} }

        /* ── VOICE CALL MODALS ── */
        .call-overlay {
            display:none; position:fixed; inset:0; background:rgba(80,0,60,0.7);
            backdrop-filter:blur(8px); z-index:1000;
            align-items:center; justify-content:center;
        }
        .call-overlay.active { display:flex; }
        .call-card {
            background:white; border-radius:28px; padding:2rem 2rem;
            text-align:center; width:300px;
            box-shadow:0 20px 60px rgba(200,60,120,0.3);
        }
        .call-avatar-big {
            width:80px; height:80px; border-radius:50%; margin:0 auto 1rem;
            display:flex; align-items:center; justify-content:center;
            font-size:36px; border:3px solid #e8a0c0;
        }
        .call-avatar-big.reyna { background:#ffd0e8; }
        .call-avatar-big.aaron { background:#d8c0ff; }
        .call-name { font-family:'Dancing Script',cursive; font-size:28px; color:#c0396a; }
        .call-status { font-size:13px; color:#a06080; margin:4px 0 1.5rem; }
        .call-pulse { animation:callPulse 1.2s infinite; }
        @keyframes callPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .call-timer { font-size:22px; font-weight:600; color:#7c3aed; margin-bottom:1.5rem; font-family:'Poppins',sans-serif; }
        .call-btns { display:flex; gap:16px; justify-content:center; }
        .call-btn {
            width:56px; height:56px; border-radius:50%; border:none;
            font-size:22px; cursor:pointer; transition:transform .15s;
        }
        .call-btn:hover { transform:scale(1.1); }
        .call-btn.accept { background:#22c55e; }
        .call-btn.decline,.call-btn.hangup { background:#ef4444; }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff0f7;z-index:50;">
    <div style="text-align:center;">
        <div style="font-size:48px;animation:pulse 1.4s infinite;">💕</div>
        <div style="font-family:'Dancing Script',cursive;font-size:24px;color:#c0396a;margin-top:12px;">Loading your love space...</div>
    </div>
</div>

<!-- PIN GATE -->
<div id="gate">
    <div class="gate-card">
        <span class="heart-anim">💖</span>
        <div class="gate-title">Our Secret Place</div>
        <div class="gate-sub">A private chat for two 🌸</div>
        <div class="name-btns">
            <button class="name-btn selected" id="btn-reyna" onclick="selectName('Reyna')">Reyna</button>
            <button class="name-btn" id="btn-aaron" onclick="selectName('Aaron')">Aaron</button>
        </div>
        <span class="pin-label">Enter your PIN</span>
        <input type="password" class="pin-input" id="pin-input" maxlength="4" placeholder="••••"
               oninput="clearErr()" onkeydown="if(event.key==='Enter') tryEnter()">
        <div class="error-msg" id="err-msg"></div>
        <button class="enter-btn" onclick="tryEnter()">Enter with love ✨</button>
    </div>
</div>

<!-- CHATROOM -->
<div id="chatroom">
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="avatar-circle">💕</div>
            <div>
                <div class="chat-title">Reyna & Aaron</div>
                <div class="chat-user-tag" id="logged-as-tag">Logged in as —</div>
            </div>
        </div>
        <div class="header-btns">
            <button class="hdr-btn" onclick="startCall()">📞 <span>Call</span></button>
            <button class="hdr-btn" id="music-btn" onclick="toggleMusic()">🎵 <span id="music-label">Play music</span></button>
        </div>
    </div>

    <div class="messages-area" id="message-area">
        <div id="no-messages-placeholder">No sweet whispers yet. Send the first message! 🌸</div>
    </div>

    <!-- Reply preview bar -->
    <div id="reply-bar">
        <div class="reply-bar-line">
            <div class="reply-bar-name" id="reply-bar-name"></div>
            <div class="reply-bar-text" id="reply-bar-text"></div>
        </div>
        <button class="reply-cancel" onclick="cancelReply()">✕</button>
    </div>

    <!-- Image preview bar -->
    <div id="img-preview-bar">
        <img id="img-preview-thumb" style="width:48px;height:48px;object-fit:cover;border-radius:10px;border:1.5px solid #e8a0c0;" />
        <span id="img-preview-name" style="font-size:12px;color:#a06080;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button onclick="clearImagePreview()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#c0396a;padding:0 4px;">✕</button>
    </div>

    <div class="chat-input-area">
        <label for="image-upload" class="img-upload-label" title="Send a photo">📷</label>
        <input type="file" id="image-upload" accept="image/*" style="display:none;" onchange="previewImage(this)">
        <input type="text" class="chat-input" id="new-message-input" placeholder="Whisper something sweet..."
               onkeydown="if(event.key==='Enter') handleSendMessage()">
        <button class="send-btn" id="send-btn" onclick="handleSendMessage()">➤</button>
    </div>
</div>

<!-- OUTGOING CALL MODAL -->
<div class="call-overlay" id="outgoing-call">
    <div class="call-card">
        <div class="call-avatar-big" id="outgoing-avatar">💕</div>
        <div class="call-name" id="outgoing-name">My Love</div>
        <div class="call-status call-pulse">Calling...</div>
        <div class="call-btns" style="margin-top:1.5rem;">
            <button class="call-btn hangup" onclick="cancelCall()" title="Cancel">📵</button>
        </div>
    </div>
</div>

<!-- INCOMING CALL MODAL -->
<div class="call-overlay" id="incoming-call">
    <div class="call-card">
        <div class="call-avatar-big" id="incoming-avatar">💕</div>
        <div class="call-name" id="incoming-name">My Love</div>
        <div class="call-status call-pulse">is calling you... 💕</div>
        <div class="call-btns" style="margin-top:1.5rem;">
            <button class="call-btn accept" onclick="acceptCall()" title="Accept">📞</button>
            <button class="call-btn decline" onclick="declineCall()" title="Decline">📵</button>
        </div>
    </div>
</div>

<!-- ACTIVE CALL MODAL -->
<div class="call-overlay" id="active-call">
    <div class="call-card">
        <div class="call-avatar-big" id="active-avatar">💕</div>
        <div class="call-name" id="active-name">My Love</div>
        <div class="call-timer" id="call-timer">0:00</div>
        <div class="call-btns">
            <button class="call-btn hangup" onclick="endCall()" title="Hang up">📵</button>
        </div>
    </div>
</div>

<!-- Audio elements -->
<audio id="bg-music" loop>
   <source src="Maki - Dilaw (Lyrics)(MP3_160K).mp3" type="audio/mpeg">
</audio>
<audio id="ringtone" loop>
    <source src="https://www.soundjay.com/phone/sounds/telephone-ring-01a.mp3" type="audio/mpeg">
</audio>
<audio id="remote-audio" autoplay></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const PIN = '0221';
    let app, db, auth;
    let userId = '';
    let currentUser = 'Reyna';
    let musicPlaying = false;
    let replyingTo = null; // { name, text, msgId }
    let peer = null;
    let currentCall = null;
    let localStream = null;
    let callTimerInterval = null;
    let callSeconds = 0;
    let incomingCallData = null;

    const loadingScreen   = document.getElementById('loading-screen');
    const gateEl          = document.getElementById('gate');
    const chatroomEl      = document.getElementById('chatroom');
    const messageArea     = document.getElementById('message-area');
    const newMessageInput = document.getElementById('new-message-input');
    const imageUpload     = document.getElementById('image-upload');
    const noMsgHolder     = document.getElementById('no-messages-placeholder');
    const bgMusic         = document.getElementById('bg-music');
    const ringtone        = document.getElementById('ringtone');
    const remoteAudio     = document.getElementById('remote-audio');

    // ── Gate ──
    window.selectName = function(name) {
        currentUser = name;
        document.getElementById('btn-reyna').className = 'name-btn' + (name==='Reyna'?' selected':'');
        document.getElementById('btn-aaron').className = 'name-btn' + (name==='Aaron'?' selected':'');
    };
    window.clearErr = function() {
        document.getElementById('err-msg').textContent = '';
        document.getElementById('pin-input').classList.remove('error');
    };
    window.tryEnter = function() {
        const pin = document.getElementById('pin-input').value.trim();
        if (pin === PIN) {
            gateEl.style.display = 'none';
            chatroomEl.style.display = 'flex';
            document.getElementById('logged-as-tag').textContent = 'Logged in as ' + currentUser;
            setupMessageListener();
            setupCallListener();
            initPeer();
            autoPlayMusic();
        } else {
            const inp = document.getElementById('pin-input');
            inp.classList.add('error');
            document.getElementById('err-msg').textContent = 'Wrong PIN, sweetie 🙈 Try again!';
            inp.value = '';
            setTimeout(() => inp.classList.remove('error'), 400);
        }
    };

    // ── Music ──
    function autoPlayMusic() {
        bgMusic.volume = 0.3;
        const p = bgMusic.play();
        if (p !== undefined) {
            p.then(() => { musicPlaying = true; document.getElementById('music-label').textContent = 'Pause music'; })
             .catch(() => { musicPlaying = false; document.getElementById('music-label').textContent = 'Play music'; });
        }
    }
    window.toggleMusic = function() {
        if (musicPlaying) { bgMusic.pause(); musicPlaying = false; document.getElementById('music-label').textContent = 'Play music'; }
        else { bgMusic.play(); musicPlaying = true; document.getElementById('music-label').textContent = 'Pause music'; }
    };

    // ── Particles ──
    function spawnParticles() {
        const emojis = ['💕','✨','🌸','💜','🩷','⭐','💗'];
        for (let i = 0; i < 6; i++) {
            const p = document.createElement('span');
            p.className = 'particle';
            p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
            p.style.left = (Math.random()*80+10)+'vw';
            p.style.bottom = '80px';
            p.style.animationDelay = (Math.random()*.5)+'s';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }
    }

    // ── Timestamps ──
    function formatDateLabel(date) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const msgDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const diffMs = today - msgDay;
        const diffDays = Math.round(diffMs/86400000);
        if (diffMs === 0) return 'Today';
        if (diffMs === 86400000) return 'Yesterday';
        if (diffDays < 7) return days[date.getDay()];
        return date.toLocaleDateString([], { month:'long', day:'numeric', year: date.getFullYear()!==now.getFullYear()?'numeric':undefined });
    }
    function formatBubbleTime(date) { return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
    function formatFullTimestamp(date) { return `${formatDateLabel(date)} at ${formatBubbleTime(date)}`; }
    function dateDividerKey(date) { return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`; }

    // ── Reply ──
    window.setReply = function(msgId, senderName, text) {
        replyingTo = { msgId, name: senderName, text };
        document.getElementById('reply-bar-name').textContent = senderName;
        document.getElementById('reply-bar-text').textContent = text || '📷 Photo';
        document.getElementById('reply-bar').style.display = 'flex';
        newMessageInput.focus();
    };
    window.cancelReply = function() {
        replyingTo = null;
        document.getElementById('reply-bar').style.display = 'none';
    };

    // ── Render ──
    let lastDateKey = null;

    function renderMessage(msg, msgId) {
        if (noMsgHolder) noMsgHolder.style.display = 'none';
        const isMine = msg.userId === userId;
        const displayName = isMine ? currentUser : (currentUser==='Reyna'?'Aaron':'Reyna');
        const avClass = displayName==='Reyna'?'reyna':'aaron';

        // Date divider
        if (msg.timestamp) {
            const d = msg.timestamp.toDate();
            const key = dateDividerKey(d);
            if (key !== lastDateKey) {
                lastDateKey = key;
                const divider = document.createElement('div');
                divider.className = 'date-divider';
                const lbl = document.createElement('span');
                lbl.textContent = formatDateLabel(d);
                divider.appendChild(lbl);
                messageArea.appendChild(divider);
            }
        }

        const wrapper = document.createElement('div');
        wrapper.style.cssText = `display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}`;

        const row = document.createElement('div');
        row.className = 'msg-row' + (isMine?' mine':'');

        // Reply button
        const replyBtn = document.createElement('button');
        replyBtn.className = 'reply-btn';
        replyBtn.title = 'Reply';
        replyBtn.textContent = '↩️';
        replyBtn.onclick = () => setReply(msgId, displayName, msg.text);
        row.appendChild(replyBtn);

        const av = document.createElement('div');
        av.className = `msg-avatar ${avClass}`;
        av.textContent = displayName.charAt(0);

        const bubble = document.createElement('div');
        bubble.className = `bubble ${isMine?'mine':'theirs'}`;

        // Sender name
        const nameEl = document.createElement('p');
        nameEl.className = 'bubble-name';
        nameEl.textContent = displayName;
        bubble.appendChild(nameEl);

        // Reply quote (if replying to someone)
        if (msg.replyTo) {
            const quote = document.createElement('div');
            quote.className = 'reply-quote';
            quote.innerHTML = `<span style="font-weight:600;font-size:10px;">${msg.replyTo.name}</span><br>${msg.replyTo.text || '📷 Photo'}`;
            bubble.appendChild(quote);
        }

        if (msg.imageUrl) {
            const img = document.createElement('img');
            img.src = msg.imageUrl;
            img.alt = 'Shared photo';
            img.className = 'bubble-img';
            bubble.appendChild(img);
        }
        if (msg.text) {
            const txt = document.createElement('p');
            txt.style.margin = '0';
            txt.textContent = msg.text;
            bubble.appendChild(txt);
        }

        if (msg.timestamp) {
            const d = msg.timestamp.toDate();
            const ts = document.createElement('p');
            ts.className = 'bubble-time';
            ts.textContent = formatBubbleTime(d);
            bubble.appendChild(ts);
            const fullTs = document.createElement('div');
            fullTs.className = 'full-timestamp';
            fullTs.textContent = formatFullTimestamp(d);
            wrapper.appendChild(row);
            wrapper.appendChild(fullTs);
        } else {
            wrapper.appendChild(row);
        }

        row.appendChild(av);
        row.appendChild(bubble);
        messageArea.appendChild(wrapper);
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    // ── Image preview ──
    window.previewImage = function(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 800000) { alert('Image too large 😢 Please pick one under 800KB.'); input.value=''; return; }
        const bar   = document.getElementById('img-preview-bar');
        const thumb = document.getElementById('img-preview-thumb');
        const name  = document.getElementById('img-preview-name');
        const reader = new FileReader();
        reader.onload = (e) => { thumb.src=e.target.result; name.textContent=file.name; bar.style.display='flex'; };
        reader.readAsDataURL(file);
    };
    window.clearImagePreview = function() {
        imageUpload.value = '';
        document.getElementById('img-preview-bar').style.display = 'none';
        document.getElementById('img-preview-thumb').src = '';
        document.getElementById('img-preview-name').textContent = '';
    };
    function fileToBase64(file) {
        return new Promise((res, rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
    }

    // ── Send message ──
    window.handleSendMessage = async function() {
        const text = newMessageInput.value.trim();
        const imageFile = imageUpload.files[0];
        if (!text && !imageFile) return;
        if (!db || !userId) return;
        const sendBtn = document.getElementById('send-btn');
        sendBtn.textContent = '⏳'; sendBtn.disabled = true;
        try {
            const appId = typeof __app_id!=='undefined' ? __app_id : 'default-app-id';
            let imageUrl = null;
            if (imageFile) { imageUrl = await fileToBase64(imageFile); clearImagePreview(); }
            const msgData = {
                text, imageUrl, userId,
                timestamp: serverTimestamp(),
            };
            if (replyingTo) {
                msgData.replyTo = { name: replyingTo.name, text: replyingTo.text, msgId: replyingTo.msgId };
            }
            await addDoc(collection(db, `artifacts/${appId}/public/data/chat_messages`), msgData);
            newMessageInput.value = '';
            cancelReply();
            spawnParticles();
        } catch (err) {
            console.error('Send error:', err);
            alert('Could not send 😢 ' + err.message);
        } finally {
            sendBtn.textContent = '➤'; sendBtn.disabled = false;
        }
    };

    // ── Firestore listener ──
    function setupMessageListener() {
        const appId = typeof __app_id!=='undefined' ? __app_id : 'default-app-id';
        const q = query(collection(db, `artifacts/${appId}/public/data/chat_messages`), orderBy('timestamp'));
        onSnapshot(q, (snapshot) => {
            messageArea.innerHTML = '';
            lastDateKey = null;
            if (snapshot.empty) { messageArea.appendChild(noMsgHolder); noMsgHolder.style.display='block'; }
            else { snapshot.docs.forEach(d => renderMessage(d.data(), d.id)); }
            messageArea.scrollTop = messageArea.scrollHeight;
        }, (err) => console.error('Snapshot error:', err));
    }

    // ── WEBRTC VOICE CALL ──
    function getPeerId(name) {
        return 'reyna-aaron-chat-' + name.toLowerCase();
    }
    function getOtherName() { return currentUser === 'Reyna' ? 'Aaron' : 'Reyna'; }

    function initPeer() {
        const peerId = getPeerId(currentUser);
        peer = new Peer(peerId, { debug: 0 });
        peer.on('call', (call) => {
            incomingCallData = call;
            showIncomingCall();
        });
        peer.on('error', (err) => console.warn('PeerJS error:', err));
    }

    function showIncomingCall() {
        const other = getOtherName();
        const avClass = other === 'Reyna' ? 'reyna' : 'aaron';
        document.getElementById('incoming-avatar').className = `call-avatar-big ${avClass}`;
        document.getElementById('incoming-avatar').textContent = other === 'Reyna' ? '👸' : '🤴';
        document.getElementById('incoming-name').textContent = other;
        document.getElementById('incoming-call').classList.add('active');
        ringtone.volume = 0.5;
        ringtone.play().catch(() => {});
    }

    window.startCall = async function() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        } catch (e) {
            alert('Microphone access denied 😢 Please allow mic permission and try again.');
            return;
        }
        const otherPeerId = getPeerId(getOtherName());
        const other = getOtherName();
        const avClass = other === 'Reyna' ? 'reyna' : 'aaron';
        document.getElementById('outgoing-avatar').className = `call-avatar-big ${avClass}`;
        document.getElementById('outgoing-avatar').textContent = other === 'Reyna' ? '👸' : '🤴';
        document.getElementById('outgoing-name').textContent = other;
        document.getElementById('outgoing-call').classList.add('active');

        currentCall = peer.call(otherPeerId, localStream);
        if (!currentCall) {
            document.getElementById('outgoing-call').classList.remove('active');
            alert('Could not reach ' + other + '. Make sure they are online 💕');
            localStream.getTracks().forEach(t => t.stop());
            return;
        }
        currentCall.on('stream', (remoteStream) => {
            remoteAudio.srcObject = remoteStream;
            showActiveCall();
        });
        currentCall.on('close', () => endCall());
        currentCall.on('error', () => endCall());
        // Timeout if no answer in 30s
        setTimeout(() => {
            if (document.getElementById('outgoing-call').classList.contains('active')) cancelCall();
        }, 30000);
    };

    window.acceptCall = function() {
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then((stream) => {
            localStream = stream;
            ringtone.pause(); ringtone.currentTime = 0;
            incomingCallData.answer(stream);
            incomingCallData.on('stream', (remoteStream) => {
                remoteAudio.srcObject = remoteStream;
                document.getElementById('incoming-call').classList.remove('active');
                showActiveCall();
            });
            incomingCallData.on('close', () => endCall());
            currentCall = incomingCallData;
        }).catch(() => {
            alert('Microphone access denied 😢');
            declineCall();
        });
    };

    window.declineCall = function() {
        ringtone.pause(); ringtone.currentTime = 0;
        document.getElementById('incoming-call').classList.remove('active');
        if (incomingCallData) { incomingCallData.close(); incomingCallData = null; }
    };

    window.cancelCall = function() {
        document.getElementById('outgoing-call').classList.remove('active');
        if (currentCall) { currentCall.close(); currentCall = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    };

    function showActiveCall() {
        document.getElementById('outgoing-call').classList.remove('active');
        document.getElementById('incoming-call').classList.remove('active');
        const other = getOtherName();
        const avClass = other === 'Reyna' ? 'reyna' : 'aaron';
        document.getElementById('active-avatar').className = `call-avatar-big ${avClass}`;
        document.getElementById('active-avatar').textContent = other === 'Reyna' ? '👸' : '🤴';
        document.getElementById('active-name').textContent = other;
        document.getElementById('active-call').classList.add('active');
        callSeconds = 0;
        callTimerInterval = setInterval(() => {
            callSeconds++;
            const m = Math.floor(callSeconds/60);
            const s = String(callSeconds%60).padStart(2,'0');
            document.getElementById('call-timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    window.endCall = function() {
        clearInterval(callTimerInterval);
        document.getElementById('active-call').classList.remove('active');
        if (currentCall) { currentCall.close(); currentCall = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        remoteAudio.srcObject = null;
    };

    // Dummy — call listener via Firebase could be added, PeerJS handles it directly
    function setupCallListener() {}

    // ── Firebase init ──
    window.onload = async function() {
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined'
                ? JSON.parse(__firebase_config)
                : {
                    apiKey: "AIzaSyB5QsjH9wMINY2tHWpoycJUsqBCyw-9ihw",
                    authDomain: "chat-9e913.firebaseapp.com",
                    projectId: "chat-9e913",
                    storageBucket: "chat-9e913.firebasestorage.app",
                    messagingSenderId: "472247605564",
                    appId: "1:472247605564:web:ef37cb5c32f0eae53ba639",
                    measurementId: "G-WQN587GL9B"
                };
            const initialAuthToken = typeof __initial_auth_token!=='undefined' ? __initial_auth_token : null;
            app  = initializeApp(firebaseConfig);
            db   = getFirestore(app);
            auth = getAuth(app);
            if (initialAuthToken) { await signInWithCustomToken(auth, initialAuthToken); }
            else { await signInAnonymously(auth); }
            onAuthStateChanged(auth, (user) => {
                userId = user ? user.uid : crypto.randomUUID();
                loadingScreen.style.display = 'none';
                gateEl.style.display = 'block';
            });
        } catch (err) {
            console.error('Firebase init error:', err);
            loadingScreen.innerHTML = '<div style="color:#c0396a;font-family:Poppins,sans-serif;padding:2rem;text-align:center;">Could not connect. Check console.</div>';
        }
    };
</script>
